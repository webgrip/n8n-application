_shared:
  storageClass: &storageClass "do-block-storage"

namespace: n8n-application

postgresql:
  # ======================================
  # Global Storage
  # ======================================
  global:
    storageClass: *storageClass

  # ======================================
  # PostgreSQL image
  # ======================================
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "17.4.0"

  architecture: standalone

  primary:
    service:
      type: ClusterIP
      ports:
        postgresql: 5432

    persistence:
      enabled: true
      size: 10Gi
      storageClass: *storageClass

    podSecurityContext:
      enabled: true
      fsGroup: 1001

    containerSecurityContext:
      enabled: true
      runAsUser: 1001

    extendedConfiguration: |
      max_connections = 100
      shared_buffers = 128MB
      effective_cache_size = 4GB
      maintenance_work_mem = 64MB
      checkpoint_completion_target = 0.9
      wal_buffers = 16MB
      default_statistics_target = 100
      random_page_cost = 1.1
      effective_io_concurrency = 200
      work_mem = 4MB
      min_wal_size = 1GB
      max_wal_size = 2GB
      max_worker_processes = 8
      max_parallel_workers_per_gather = 4
      max_parallel_workers = 8
      max_parallel_maintenance_workers = 2
      
      # Enable WAL archiving
      archive_mode = on
      wal_level = replica

      # Use WAL-G to push each completed WAL segment to DO Spaces
      archive_command = 'wal-g wal-push "%p"'

      # Force a WAL segment switch at least every 60 seconds
      archive_timeout = 60

    extraEnvVars:
      # You can rename these to AWS_* if you prefer; "SPACES_*" also works
      - name: SPACES_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: do-spaces-secret
            key: ACCESS_KEY
      - name: SPACES_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: do-spaces-secret
            key: SECRET_KEY

      # This key is recognized by WAL-G if you set WALG_S3_PREFIX to use them.
      # Or you can unify them as AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY if you want.
      - name: WALG_S3_PREFIX
        value: "s3://my-pg-backups/prod-cluster"

      - name: AWS_ENDPOINT
        value: "ams1.digitaloceanspaces.com"
      - name: AWS_S3_FORCE_PATH_STYLE
        value: "true"

    # --------------------------------------------------------------------------
    # Network Policy
    #
    # If you want the DB to push out to DO Spaces,
    # you should enable external egress traffic.
    # --------------------------------------------------------------------------
    networkPolicy:
      enabled: true
      allowExternal: true
      allowExternalEgress: true

  auth:
    enablePostgresUser: true
    username: "myuser"
    existingSecret: "postgresql-secret"
    database: "mydatabase"

  tls:
    enabled: true
    autoGenerated: true

  metrics:
    enabled: true

  # --------------------------------------------------------------------------
  # Built-in "backup" CronJob => WALG base backup
  #
  # We'll run "wal-g backup-push" to create a physical base backup
  # once a day at 2 AM, stored in DO Spaces
  # --------------------------------------------------------------------------
  backup:
    enabled: true
    cronjob:
      schedule: "0 2 * * *"       # 2 AM daily
      timeZone: "Europe/Amsterdam"
      concurrencyPolicy: Forbid
      restartPolicy: OnFailure

      command:
        - /bin/bash
        - -ec
        - |
          echo "[WAL-G Base Backup] Starting at $(date)"
          wal-g backup-push /bitnami/postgresql/data
          echo "[WAL-G Base Backup] Finished at $(date)"

      # Make sure the CronJob container has the same environment as primary
      # so it knows how to connect to DO Spaces, etc.
      extraEnvVars:
        - name: WALG_S3_PREFIX
          value: "s3://6ncsb7shrqmcgmixbmed/pg-backups"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: do-spaces-secret
              key: ACCESS_KEY
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: do-spaces-secret
              key: SECRET_KEY
        - name: AWS_ENDPOINT
          value: "ams3.digitaloceanspaces.com"
        - name: AWS_S3_FORCE_PATH_STYLE
          value: "true"
        - name: AWS_REGION
          value: "nyc3"

# ============================================================================
# 2) EXTRA DEPLOY => A 2nd CronJob for a DAILY SQL DUMP
#
# The Bitnami chart only has one built-in "backup" job.
# We'll add a second CronJob using "extraDeploy" to do "pg_dumpall" -> Spaces.
# ============================================================================
  extraDeploy:
    - apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: postgresql-logicaldump
        labels:
          app.kubernetes.io/name: postgresql
          app.kubernetes.io/component: backup
          app.kubernetes.io/instance: logicaldump
      spec:
        schedule: "30 2 * * *"    # 2:30 AM daily (30 min after the physical backup)
        concurrencyPolicy: "Forbid"
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: "OnFailure"
                securityContext:
                  fsGroup: 1001
                containers:
                  - name: pgdump
                    # We'll use the same Bitnami PostgreSQL image
                    # because it includes pg_dump. Alternatively,
                    # you could use another container with psql/pg_dump installed.
                    image: "docker.io/bitnami/postgresql:17.4.0"
                    imagePullPolicy: IfNotPresent

                    # We run "pg_dumpall" to a file, then "aws s3 cp"
                    # to push that file to DO Spaces.
                    command:
                      - /bin/bash
                    args:
                      - -ec
                      - |
                        echo "[SQL Dump] Starting at $(date)"
                        DUMP_FILE="/tmp/dumpall-$(date '+%Y%m%d%H%M%S').sql"
  
                        # 1) Perform a logical dump of *all* DBs (including roles)
                        pg_dumpall --clean --if-exists --quote-all-identifiers > "$DUMP_FILE"
  
                        echo "Dump created at $DUMP_FILE. Now uploading to DO Spaces..."
  
                        # 2) Upload using 'aws' CLI. If you prefer "s3cmd" or "curl", adapt accordingly.
                        # Note: The default Bitnami PostgreSQL image does NOT have awscli installed,
                        # so we might need to install it on-the-fly. 
                        # For "production" use, consider a custom image or "apk add aws-cli" (Alpine).
                        
                        apt update && apt install -y awscli  # Debian-based if your image is Debian. 
                        
                        aws --endpoint-url "https://ams3.digitaloceanspaces.com" \
                          s3 cp "$DUMP_FILE" s3://6ncsb7shrqmcgmixbmed/dump-sql/
                        
                        echo "[SQL Dump] Finished at $(date)"

                    env:
                      - name: AWS_ACCESS_KEY_ID
                        valueFrom:
                          secretKeyRef:
                            name: do-spaces-secret
                            key: ACCESS_KEY
                      - name: AWS_SECRET_ACCESS_KEY
                        valueFrom:
                          secretKeyRef:
                            name: do-spaces-secret
                            key: SECRET_KEY
                      - name: AWS_S3_FORCE_PATH_STYLE
                        value: "true"
                      - name: AWS_REGION
                        value: "ams3"
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 1001
