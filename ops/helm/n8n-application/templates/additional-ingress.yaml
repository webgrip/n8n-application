{{- /*
  additional-ingress.yaml

  This file creates a second Ingress object that serves specific paths (/api/v1, /webhook)
  without the default Traefik middlewares. Adjust it however you need.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "n8n-application.fullname" . }}-bypass
  labels:
    app.kubernetes.io/name: {{ include "n8n-application.name" . }}
    helm.sh/chart: {{ include "n8n-application.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
  # Put NO basic-auth or IP allow-list middlewares here:
  annotations:
    # Use the same ingress class
    kubernetes.io/ingress.class: "ingress-traefik"
    # Force no middlewares on these paths (overrides default).
    traefik.ingress.kubernetes.io/router.middlewares: ""
spec:
  rules:
    - host: {{ .Values.n8n.ingress.hosts[0].host | quote }}
      http:
        paths:
            - path: /api/v1
              pathType: Prefix
              backend:
                service:
                  name: {{ include "n8n-application.fullname" . }}
                  port:
                    number: 80
              - path: /webhook
                pathType: Prefix
                backend:
                  service:
                    name: {{ include "n8n-application.fullname" . }}
                    port:
                      number: 80
  tls:
    - hosts:
        - {{ .Values.n8n.ingress.hosts[0].host | quote }}
      secretName: {{ .Values.n8n.ingress.tls[0].secretName | quote }}
